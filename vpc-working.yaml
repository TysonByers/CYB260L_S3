AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a VPC spanning 3 Availability Zones
  in us-west-2 for student ID eribye9636.

Parameters:
  EnvironmentName:
    Type: String
    Default: VPC-eribye9636
    Description: Name of the VPC environment.

Resources:

  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref EnvironmentName

  SubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-west-2a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-subnet-az1"

  SubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-west-2b
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-subnet-az2"

  SubnetAZ3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: us-west-2c
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-subnet-az3"

Outputs:
  VPCId:
    Description: ID of the created VPC
    Value: !Ref MyVPC

  Subnet1:
    Description: Subnet in us-west-2a
    Value: !Ref SubnetAZ1

  Subnet2:
    Description: Subnet in us-west-2b
    Value: !Ref SubnetAZ2

  Subnet3:
    Description: Subnet in us-west-2c
    Value: !Ref SubnetAZ3

